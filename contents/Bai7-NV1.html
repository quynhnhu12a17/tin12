<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đóng góp ý kiến</title>
</head>
<body>
    <h2>Đóng góp ý kiến cho thư viện của nhà trường</h2>
    <form>
        <h3>1. Thông tin về người góp ý</h3>
        <label>Họ và tên: <input type="text" name="txtTen"></label><br><br>
        <label>Địa chỉ email: <input type="text" name="txtEmail"></label><br><br>
        
        <h3>2. Đóng góp ý kiến</h3>
        <label>Ý kiến đóng góp: <br>
            <textarea name="txtComment" rows="6" cols="40"></textarea>
        </label><br><br>
        
        <input type="submit" value="Gửi ý kiến">
    </form>
</body>
</html>
