<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Hội thao</title>
</head>
<body>

    <h2>Đăng kí tham gia Hội thao</h2>

    <form>
        <label for="hoten">Họ và tên:</label>
        <input type="text" id="hoten" name="hoten"><br><br>

        <label for="email">Địa chỉ email:</label>
        <input type="email" id="email" name="email"><br><br>

        <input type="radio" id="lop10" name="khoilop" value="10">
        <label for="lop10">Lớp 10</label>
        <input type="radio" id="lop11" name="khoilop" value="11">
        <label for="lop11">Lớp 11</label>
        <input type="radio" id="lop12" name="khoilop" value="12">
        <label for="lop12">Lớp 12</label><br><br>

        <label>Tham dự môn:</label><br>
        <input type="radio" id="bongban" name="monhoc" value="Bóng bàn">
        <label for="bongban">Bóng bàn</label><br>
        <input type="radio" id="caulong" name="monhoc" value="Cầu lông">
        <label for="caulong">Cầu lông</label><br>
        <input type="radio" id="covua" name="monhoc" value="Cờ vua">
        <label for="covua">Cờ vua</label><br><br>

        <input type="submit" value="Đăng kí">
        <input type="reset" value="Huỷ bỏ">
    </form>

</body>
</html>
